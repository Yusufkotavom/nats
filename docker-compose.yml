services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://nats:nats_password@db:5432/nats?schema=public
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=nats
      - POSTGRES_PASSWORD=nats_password
      - POSTGRES_DB=nats
    ports:
      - "5432:5432"
    volumes:
      - nats_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nats -d nats"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nats_db_data:
