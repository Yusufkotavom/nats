services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma migrate deploy"
    environment:
      - DATABASE_URL=postgresql://nats:nats_password@db:5432/nats?schema=public
      - NODE_ENV=production
      - SESSION_SECRET=ds12a324vADJ123#@
      - STORAGE_DRIVER=local
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3007:3000"
    environment:
      - DATABASE_URL=postgresql://nats:nats_password@db:5432/nats?schema=public
      - NODE_ENV=production
      - SESSION_SECRET=ds12a324vADJ123#@
      - STORAGE_DRIVER=local
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=nats
      - POSTGRES_PASSWORD=nats_password
      - POSTGRES_DB=nats
    ports:
      - "5439:5432"
    volumes:
      - nats_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nats -d nats"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nats_db_data:
