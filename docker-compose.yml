services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma migrate deploy"
    environment:
      - DATABASE_URL=postgresql://nats:nats_password@db:5432/nats?schema=public
      - NODE_ENV=production
      - SESSION_SECRET=ds12a324vADJ123#@
      - STORAGE_DRIVER=local
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3007:3000"
    environment:
      - DATABASE_URL=postgresql://nats:nats_password@db:5432/nats?schema=public
      - NODE_ENV=production
      - SESSION_SECRET=ds12a324vADJ123#@
      - STORAGE_DRIVER=minio
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=nats_minio
      - MINIO_SECRET_KEY=nats_minio_secret
      - MINIO_BUCKET_NAME=nats-files
      - MINIO_PUBLIC_ENDPOINT=localhost
      - MINIO_PUBLIC_PORT=9000
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=nats
      - POSTGRES_PASSWORD=nats_password
      - POSTGRES_DB=nats
    ports:
      - "5439:5432"
    volumes:
      - nats_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nats -d nats"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=nats_minio
      - MINIO_ROOT_PASSWORD=nats_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nats_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nats_db_data:
  nats_minio_data:
